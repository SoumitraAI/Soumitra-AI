<figure class="showpiece">
<svg viewBox="0 0 600 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The field of AI nests inwards from artificial intelligence down to large language models. RAG and agents are architectures built on top of LLMs, leading to automated business systems.">
  <defs>
    <style>
      .nl { font-family: 'IBM Plex Mono', monospace; fill: #6e8296; font-size: 11px; letter-spacing: 0.08em; }
      .core { font-family: 'IBM Plex Sans', sans-serif; fill: #e9eff5; font-weight: 600; }
      .built { font-family: 'IBM Plex Sans', sans-serif; fill: #0b2239; font-weight: 600; font-size: 15px; }
      .builtsub { font-family: 'IBM Plex Mono', monospace; fill: #0a4f4b; font-size: 10px; }
      .sys { font-family: 'IBM Plex Sans', sans-serif; fill: #e9eff5; font-size: 14px; }
      .syssub { font-family: 'IBM Plex Mono', monospace; fill: #6e8296; font-size: 10px; letter-spacing: 0.06em; }
    </style>
  </defs>

  <!-- ===== Nested rings (top) ===== -->
  <rect x="40" y="20" width="520" height="300" rx="6" fill="none" stroke="#2fd6c3" stroke-opacity="0.25"/>
  <text x="56" y="42" class="nl" fill="#2fd6c3">ARTIFICIAL INTELLIGENCE</text>

  <rect x="70" y="56" width="460" height="248" rx="5" fill="#0d1825" stroke="#6e8296" stroke-opacity="0.3"/>
  <text x="86" y="78" class="nl">MACHINE LEARNING</text>

  <rect x="100" y="92" width="400" height="196" rx="5" fill="#112134" stroke="#6e8296" stroke-opacity="0.4"/>
  <text x="116" y="114" class="nl">DEEP LEARNING</text>

  <rect x="130" y="128" width="340" height="144" rx="4" fill="#13263c" stroke="#6e8296" stroke-opacity="0.5"/>
  <text x="146" y="150" class="nl">NEURAL NETWORKS</text>

  <rect x="160" y="164" width="280" height="92" rx="4" fill="#16304b" stroke="#2fd6c3" stroke-opacity="0.4"/>
  <text x="176" y="186" class="nl" fill="#9ab8d1">TRANSFORMERS</text>

  <rect x="240" y="200" width="120" height="44" rx="4" fill="#1c3550" stroke="#2fd6c3" stroke-opacity="0.7"/>
  <text x="300" y="227" text-anchor="middle" class="core" font-size="17">LLMs</text>

  <!-- ===== Connector down ===== -->
  <line x1="300" y1="320" x2="300" y2="356" stroke="#2fd6c3" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
  <text x="300" y="344" text-anchor="middle" class="nl" fill="#2fd6c3">BUILT ON TOP OF LLMs</text>

  <!-- ===== Built-on layer (bottom) ===== -->
  <rect x="120" y="360" width="360" height="50" rx="4" fill="#2fd6c3"/>
  <text x="150" y="384" class="built">RAG</text>
  <text x="150" y="400" class="builtsub">what to reason about</text>

  <rect x="120" y="422" width="360" height="50" rx="4" fill="#2fd6c3"/>
  <text x="150" y="446" class="built">AGENTS</text>
  <text x="150" y="462" class="builtsub">plan · use tools · act · repeat</text>

  <line x1="300" y1="472" x2="300" y2="500" stroke="#2fd6c3" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>

  <rect x="120" y="500" width="360" height="50" rx="4" fill="none" stroke="#2fd6c3" stroke-opacity="0.6"/>
  <text x="150" y="524" class="sys">AUTOMATED BUSINESS SYSTEMS</text>
  <text x="150" y="540" class="syssub">consistent business outcomes</text>
</svg>
<figcaption>Figure 1 — The field nests inwards to LLMs; the operational layers build outwards from them.</figcaption>
</figure>
